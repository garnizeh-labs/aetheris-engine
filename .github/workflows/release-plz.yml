# THIS FILE IS MANAGED BY AETHERIS CI STANDARDS (PORTED FROM PROTOCOL)
# DO NOT EDIT MANUALLY WITHOUT SYNCHRONIZING ACROSS ARCHITECTURE REPOS

name: Release-plz

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - main

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          path: aetheris-engine

      - name: Checkout protocol
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: garnizeh-labs/aetheris-protocol
          path: aetheris-protocol

      - name: Cache Cargo
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            aetheris-engine/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-1.95.0
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
            ${{ runner.os }}-cargo-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # 1.95.0
        with:
          toolchain: 1.95.0

      - name: Setup Global Cargo Patches (to fix historical metadata checks)
        run: |
          mkdir -p ~/.cargo
          cat <<EOF > ~/.cargo/config.toml
          [patch.crates-io]
          aetheris-protocol = { path = "$(pwd)/aetheris-protocol/crates/aetheris-protocol" }
          aetheris-encoder-serde = { path = "$(pwd)/aetheris-protocol/crates/aetheris-encoder-serde" }
          aetheris-encoder-bitpack = { path = "$(pwd)/aetheris-protocol/crates/aetheris-encoder-bitpack" }
          EOF

      - name: Run release-plz
        uses: release-plz/action@49c995b2442b0f60dd4aab07a164cc00643471fc # v0.5.128
        with:
          project_manifest: aetheris-engine/Cargo.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
